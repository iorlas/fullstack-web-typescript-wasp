name: a2sdlc
on:
  issues:
    types: [labeled]
  issue_comment:
    types: [created]
  pull_request:
    types: [labeled]

concurrency:
  group: a2sdlc-${{ github.event.issue.number || github.event.pull_request.number }}
  cancel-in-progress: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  agent:
    if: >-
      github.event_name != 'issue_comment' ||
      github.event.comment.user.type != 'Bot'
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Generate App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.A2SDLC_APP_ID }}
          private-key: ${{ secrets.A2SDLC_APP_PRIVATE_KEY }}

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}
          fetch-depth: 0

      - name: Configure git
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          BOT_ID=$(gh api "/users/a2sdlc%5Bbot%5D" --jq .id 2>/dev/null || echo "0")
          git config user.name "a2sdlc[bot]"
          git config user.email "${BOT_ID}+a2sdlc[bot]@users.noreply.github.com"

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install a2sdlc + Claude CLI
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          pip install git+https://x-access-token:${GH_TOKEN}@github.com/agentic-eng/a2sdlc.git
          npm install -g @anthropic-ai/claude-code

      - name: Install Superpowers plugin
        run: |
          claude plugin marketplace add obra/superpowers-marketplace
          claude plugin install superpowers@superpowers-marketplace --scope user

      - name: Dispatch
        env:
          CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: a2sdlc dispatch
