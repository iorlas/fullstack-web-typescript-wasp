adapter: github
pipeline:
  auto_spec: false
  auto_proceed: true
  auto_merge: false
  default_base: main
test_command: make check
stages:
  spec:
    max_turns: 35
    timeout_minutes: 30
  implement:
    code_reviews: 2
    max_turns: 120
    timeout_minutes: 60
    max_review_cycles: 2
  review:
    max_turns: 25
    timeout_minutes: 20
